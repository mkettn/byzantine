# Fixed feast days with fasting rules
- "e": Easter Sunday
- "e+39": Ascension
- "e+50": Pentecost (Holy Spirit)
- "0106": Theophany
- "0325":
    name: Annunciation
    rule: no_fish
- "0624":
    name: Nativity of John Baptist
    rule: no_dairy
- "0628":
    name: St Peter and Paul Eve
    rule: no_dairy
- "0806":
    name: Transfiguration
    rule: no_dairy
- "0815":
    name: Dormition
    rule: no_dairy
- "0829":
    name: Beheading of John Baptist
    rule: no_oil
- "0914":
    name: Exaltation of Cross
    rule: no_fish
- "1221":
    name: Entry of Theotokos
    rule: no_dairy
- "1220":
    name: Forefeast of Nativity
    rule: no_dairy
- "e-7d":
    name: Palm Sunday
    rule: no_dairy

# Wednesday/Friday no oil (Theophany to Christmas)
- "0106..1225":
    wed: no_oil
    fri: no_oil

# Week of the Prodigal Son (10 weeks before Easter - no fasting)
- "e-70d..e-64d":
    mon..sun: no_fast

# Meatfare week (8 weeks before Easter - no meat)
- "e-56d..e-50d":
    mon..sun: no_meat

# Great Lent (7 weeks before Easter to day before Easter)
- "e-49d..e":
    mon..fri: no_oil
    sat..sun: no_fish

# Bright Week (Easter week - no fasting)
- "e..e+6d":
    mon..sun: no_fast

# Week after Easter to Pentecost (Wed/Fri no fish)
- "e+7d..e+49d":
    wed: no_fish
    fri: no_fish

# Pentecost week (no fasting)
- "e+49d..e+55d":
    mon..sun: no_fast

# Apostles Fast (Monday after Pentecost to June 29)
- "e+50d..0629":
    mon..fri: no_oil
    sat..sun: no_dairy

# Dormition Fast (2 weeks before Aug 15)
- "0801..0815":
    mon..fri: no_oil
    sat..sun: no_fish

# Christmas Fast (40 days before Dec 25)
- "1115..1224":
    mon..tue: no_oil
    thu: no_oil
    wed, fri: no_fish
    sat..sun: no_dairy

# Christmas Day - no fasting (new calendar only)
- "1225":
    name: Christmas
    rule: no_fast
